baseURL = 'https://www.d5n.xyz'
defaultContentLanguage = 'zh'
defaultContentLanguageInSubdir = false
languageCode = 'zh-CN'
hasCJKLanguage = true
title = 'D5N'
theme = 'PaperMod'

# 多语言配置
[languages]
  [languages.zh]
    languageName = '中文'
    languageCode = 'zh-CN'
    weight = 1
    contentDir = 'content'
    [languages.zh.params]
      subtitle = '探索 AI、智能体与自动化工具'
      description = 'D5N Tech Space | AI · Agents · Automation'
      keywords = ['AI', '智能体', '自动化', 'OpenClaw', '技术博客']
      mainSections = ['posts']
    [languages.zh.menu]
      [[languages.zh.menu.main]]
        identifier = 'posts'
        name = '文章'
        url = '/posts/'
        weight = 10
      [[languages.zh.menu.main]]
        identifier = 'tags'
        name = '标签'
        url = '/tags/'
        weight = 20
      [[languages.zh.menu.main]]
        identifier = 'about-zh'
        name = '关于'
        url = '/about/'
        weight = 30
      [[languages.zh.menu.main]]
        identifier = 'rss'
        name = '订阅'
        url = '/index.xml'
        weight = 40

  [languages.en]
    languageName = 'English'
    languageCode = 'en-US'
    weight = 2
    contentDir = 'content/en'
    [languages.en.params]
      subtitle = 'Exploring AI, Agents & Automation'
      description = 'D5N Tech Space | AI · Agents · Automation'
      keywords = ['AI', 'Agents', 'Automation', 'OpenClaw', 'Tech Blog']
      mainSections = ['posts']
    [languages.en.menu]
      [[languages.en.menu.main]]
        identifier = 'posts'
        name = 'Posts'
        url = '/en/posts/'
        weight = 10
      [[languages.en.menu.main]]
        identifier = 'tags'
        name = 'Tags'
        url = '/en/tags/'
        weight = 20
      [[languages.en.menu.main]]
        identifier = 'about-en'
        name = 'About'
        url = '/en/about/'
        weight = 30
      [[languages.en.menu.main]]
        identifier = 'rss'
        name = 'RSS'
        url = '/en/index.xml'
        weight = 40

[params]
  author = 'Duran'
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  
  # Enable comments by default
  comments = true
  
  # 启用多语言切换
  ShowLanguageSwitch = true
  
  # Google Analytics 4
  [params.analytics.google]
    measurementID = 'G-C6NHK7FMZ7'
  
  # Giscus Comments
  [params.giscus]
    repo = "openduran/duranblog"
    repoID = "R_kgDORSDJPQ"
    category = "General"
    categoryID = "DIC_kwDORSDJPc4C2tEr"
    mapping = "pathname"
    reactionsEnabled = "1"
    emitMetadata = "0"
    inputPosition = "bottom"
    theme = "preferred_color_scheme"
    lang = "zh-CN"
    loading = "lazy"
  
  [params.profileMode]
    enabled = false
    title = 'D5N Tech Space'
    subtitle = '探索 AI、智能体与自动化工具'
    imageUrl = 'https://raw.githubusercontent.com/openduran/duranblog/main/static/avatar.png'
    imageTitle = 'Duran'
    
    [[params.profileMode.buttons]]
      name = '文章'
      url = 'posts'
    [[params.profileMode.buttons]]
      name = '标签'
      url = 'tags'

[taxonomies]
  tag = 'tags'
  category = 'categories'

[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]

[outputFormats]
  [outputFormats.RSS]
    mediatype = "application/rss"
    baseName = "index"

# SEO: Sitemap configuration
[sitemap]
  changefreq = 'weekly'
  filename = 'sitemap.xml'
  priority = 0.5

# SEO: Enable robots.txt
enableRobotsTXT = true
